<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RealmTime | Console</title>
    <!-- ПОДКЛЮЧАЕМ СКРИПТ ТЕЛЕГРАМА (БЕЗ НЕГО КНОПКИ НЕ БУДУТ СВЯЗЫВАТЬСЯ С БОТОМ) -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: #090610;
            background: radial-gradient(circle at top, #140e28 0%, #08050d 70%);
            color: #ececed;
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            background: #0d0a16;
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: 1.15rem;
            letter-spacing: 0.5px;
        }

        .logo-icon {
            color: #724bf2;
            font-size: 1.3rem;
        }

        .login-btn {
            background: linear-gradient(135deg, #6236ff 0%, #4b1fff 100%);
            border: none;
            color: white;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(98, 54, 255, 0.3);
            transition: all 0.3s ease;
        }

        .tabs-menu {
            display: flex;
            gap: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            padding-bottom: 12px;
        }

        .tab-link {
            color: #4e4a5d;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
        }

        .tab-link.active {
            color: #ececed;
        }

        .features-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .feature-row {
            background: #110e1c;
            border-radius: 14px;
            padding: 14px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid transparent;
            transition: all 0.25s ease;
        }

        .feature-row:hover {
            background: #141023;
            border-color: rgba(114, 75, 242, 0.15);
        }

        .feature-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .feature-name {
            font-size: 0.95rem;
            font-weight: 500;
            color: #928fa4;
        }

        .feature-row:hover .feature-name {
            color: #ffffff;
        }

        .feature-value {
            font-size: 0.85rem;
            color: #4e4a5d;
        }

        .feature-value span {
            color: #724bf2;
            font-weight: 500;
        }

        .software-input {
            background: #08060f;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 8px 12px;
            color: #fff;
            font-size: 0.85rem;
            outline: none;
            width: 140px;
            box-sizing: border-box;
            transition: all 0.3s ease;
            text-align: right;
        }

        .software-input:focus {
            border-color: #724bf2;
            background: #0b0816;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #1a162b;
            transition: .3s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 4px;
            bottom: 4px;
            background-color: #4e4a5d;
            transition: .3s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #6236ff;
            box-shadow: 0 0 15px rgba(98, 54, 255, 0.4);
        }

        input:checked + .slider:before {
            transform: translateX(20px);
            background-color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header">
            <div class="logo-area">
                <span class="logo-icon">🔮</span>
                <span>RealmTime</span>
            </div>
            <button class="login-btn">Логин</button>
        </div>

        <div class="tabs-menu">
            <span class="tab-link active">Profile</span>
            <span class="tab-link">Casino</span>
            <span class="tab-link">Utilities</span>
        </div>

        <div class="features-grid">
            <div class="feature-row">
                <div class="feature-info">
                    <div class="feature-name">Игрок статус</div>
                    <div class="feature-value">Добро пожаловать, <span id="player-status">Игрок!</span></div>
                </div>
                <div style="font-size: 0.85rem; color: #4e4a5d; font-weight: 500;">Active</div>
            </div>

            <div class="feature-row">
                <div class="feature-info">
                    <div class="feature-name">Никнейм</div>
                    <div class="feature-value">Сервер: <span id="mc-nick">Загрузка...</span></div>
                </div>
                <input type="text" class="software-input" placeholder="Твой ник" id="nick-input">
            </div>

            <div class="feature-row">
                <div class="feature-info">
                    <div class="feature-name">Текущий баланс</div>
                    <div class="feature-value">Доступно: <span id="balance-amount">0 рилликов</span></div>
                </div>
                <div style="font-size: 1.1rem; font-weight: 600; color: #6236ff;">$</div>
            </div>

            <div class="feature-row">
                <div class="feature-info">
                    <div class="feature-name">Получить код привязки</div>
                    <div class="feature-value">Генерация сессии авторизации</div>
                </div>
                <label class="switch">
                    <input type="checkbox" id="get-code-toggle">
                    <span class="slider"></span>
                </label>
            </div>

            <div class="feature-row">
                <div class="feature-info">
                    <div class="feature-name">Вывести все риллики</div>
                    <div class="feature-value">Мгновенный перевод на сервер</div>
                </div>
                <label class="switch">
                    <input type="checkbox" id="withdraw-toggle">
                    <span class="slider"></span>
                </label>
            </div>
        </div>
    </div>

    <!-- ИНТЕЛЛЕКТУАЛЬНЫЙ СКРИПТ ДЛЯ СВЯЗИ С БОТОМ -->
    <script>
        // Инициализируем Телеграм WebApp
        const tg = window.Telegram.WebApp;
        tg.expand(); // Расширяем на весь экран смартфона

        // Динамически подставляем имя пользователя из Телеграма в профиль
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            document.getElementById('player-status').innerText = tg.initDataUnsafe.user.first_name + '!';
        }

        // Клик по тумблеру "Получить код"
        document.getElementById('get-code-toggle').addEventListener('change', function() {
            if(this.checked) {
                const nick = document.getElementById('nick-input').value.trim();
                
                if(!nick) {
                    alert("Сначала введи свой ник в поле выше!");
                    this.checked = false;
                    return;
                }

                // Отправляем структурированные данные боту
                const dataToSend = {
                    action: "get_code",
                    nickname: nick
                };
                
                tg.sendData(JSON.stringify(dataToSend)); // Эта строчка шлет данные обратно в Python
                
                setTimeout(() => { this.checked = false; }, 600);
            }
        });

        // Клик по тумблеру "Вывести все риллики"
        document.getElementById('withdraw-toggle').addEventListener('change', function() {
            if(this.checked) {
                const nick = document.getElementById('nick-input').value.trim();
                
                const dataToSend = {
                    action: "withdraw_balance",
                    nickname: nick || "Не указан"
                };
                
                tg.sendData(JSON.stringify(dataToSend));
                
                setTimeout(() => { this.checked = false; }, 600);
            }
        });
    </script>
</body>
</html>
